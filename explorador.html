<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Explorador ET2023 — FNFPCE</title>
  <link rel="stylesheet" href="vendor/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/cne-theme.css"/>
  <link rel="stylesheet" href="vendor/css/all.min.css"/>
  <style>
    /* ── KPI mini ─────────────────────────────── */
    .kpi-card { border-radius:10px; padding:.75rem 1rem; color:#fff; display:flex; align-items:center; gap:.7rem; }
    .kpi-card .icon { font-size:1.2rem; opacity:.8; }
    .kpi-card .val  { font-size:1rem; font-weight:700; }
    .kpi-card .lbl  { font-size:.62rem; opacity:.75; text-transform:uppercase; letter-spacing:.04em; }
    .kpi-blue   { background:linear-gradient(135deg,#003478,#1565c0); }
    .kpi-green  { background:linear-gradient(135deg,#1b5e20,#2e7d32); }
    .kpi-orange { background:linear-gradient(135deg,#e65100,#f57c00); }
    .kpi-purple { background:linear-gradient(135deg,#4a148c,#6a1b9a); }
    .kpi-teal   { background:linear-gradient(135deg,#00695c,#00897b); }
    .kpi-red    { background:linear-gradient(135deg,#b71c1c,#c62828); }

    /* ── Breadcrumb ───────────────────────────── */
    .breadcrumb-cne {
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
      background:rgba(4,20,50,.8); border:1px solid rgba(252,209,22,.18);
      border-radius:8px; padding:.6rem 1rem; margin-bottom:1rem;
      font-size:.82rem;
    }
    .bc-item {
      color:rgba(224,244,255,.6); cursor:pointer;
      transition:color .15s;
    }
    .bc-item:hover { color:#FCD116; }
    .bc-item.active { color:#FCD116; font-weight:700; cursor:default; }
    .bc-sep { color:rgba(252,209,22,.3); font-size:.7rem; }

    /* ── Corp tiles ───────────────────────────── */
    .corp-tile {
      background:rgba(4,20,50,.9);
      border:1px solid rgba(252,209,22,.2);
      border-radius:12px; padding:1.4rem; text-align:center;
      cursor:pointer; transition:all .2s; height:100%;
    }
    .corp-tile:hover  { border-color:#FCD116; transform:translateY(-2px); box-shadow:0 4px 20px rgba(252,209,22,.15); }
    .corp-tile.active { border-color:#FCD116; background:rgba(0,56,147,.3); }
    .corp-tile .ct-icon { font-size:2rem; margin-bottom:.5rem; }
    .corp-tile .ct-name {
      font-family:'Orbitron',monospace; font-size:.82rem;
      font-weight:700; color:#FCD116; letter-spacing:.06em;
    }
    .corp-tile .ct-stats { font-size:.72rem; color:rgba(224,244,255,.55); margin-top:.4rem; }
    .ct-bar { height:5px; background:rgba(255,255,255,.08); border-radius:3px; margin:.5rem auto 0; overflow:hidden; max-width:120px; }
    .ct-bar-fill { height:100%; background:linear-gradient(90deg,#2e7d32,#43a047); border-radius:3px; }

    /* ── Lista de ítems (dpto / muni / partido) ─ */
    .list-section { background:rgba(4,20,50,.85); border:1px solid rgba(252,209,22,.15); border-radius:12px; overflow:hidden; }
    .list-header {
      background:rgba(0,56,147,.4); padding:.65rem 1rem;
      font-family:'Orbitron',monospace; font-size:.7rem;
      color:#FCD116; letter-spacing:.06em;
      display:flex; justify-content:space-between; align-items:center;
    }
    .list-item {
      display:flex; align-items:center; padding:.7rem 1rem;
      border-bottom:1px solid rgba(252,209,22,.07);
      cursor:pointer; transition:background .15s; gap:.75rem;
    }
    .list-item:last-child { border-bottom:none; }
    .list-item:hover { background:rgba(0,56,147,.25); }
    .li-name { flex:1; font-size:.85rem; font-weight:600; color:#e0f4ff; }
    .li-sub  { font-size:.7rem; color:rgba(224,244,255,.45); }
    .li-money { text-align:right; min-width:120px; }
    .li-money .lm-val  { font-size:.82rem; font-weight:700; color:#64b5f6; }
    .li-money .lm-neto { font-size:.75rem; color:#a5d6a7; }
    .li-bar  { width:80px; }
    .mini-bar { height:5px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; }
    .mini-bar-fill { height:100%; background:#43a047; border-radius:3px; }
    .mini-pct { font-size:.65rem; color:rgba(224,244,255,.5); text-align:right; margin-top:2px; }
    .li-count { font-size:.7rem; color:rgba(224,244,255,.4); min-width:50px; text-align:right; }
    .arrow-icon { color:rgba(252,209,22,.3); font-size:.75rem; }

    /* ── Detalle partido ─────────────────────── */
    .partido-detail {
      background:rgba(4,20,50,.95); border:1px solid rgba(252,209,22,.25);
      border-radius:12px; overflow:hidden;
    }
    .pd-header {
      background:rgba(0,56,147,.45); padding:1rem 1.2rem;
      display:flex; justify-content:space-between; align-items:flex-start; gap:1rem;
    }
    .pd-nombre { font-family:'Orbitron',monospace; font-size:.85rem; font-weight:700; color:#FCD116; }
    .pd-loc    { font-size:.75rem; color:rgba(224,244,255,.55); margin-top:.25rem; }
    .pd-body   { padding:1rem 1.2rem; }

    .pd-section-title {
      font-size:.68rem; text-transform:uppercase; letter-spacing:.08em;
      color:rgba(252,209,22,.7); margin-bottom:.6rem; font-weight:600;
    }
    .pd-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.6rem; margin-bottom:1rem; }
    .pd-stat { background:rgba(0,0,0,.25); border-radius:8px; padding:.65rem .8rem; }
    .pd-stat .ps-lbl { font-size:.65rem; color:rgba(224,244,255,.5); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
    .pd-stat .ps-val { font-size:.9rem; font-weight:700; }
    .val-rec  { color:#64b5f6; }
    .val-aud  { color:#ef9a9a; }
    .val-neto { color:#a5d6a7; }
    .val-ing  { color:#ce93d8; }
    .val-gast { color:#ffcc80; }

    .pd-res-grid { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1rem; }
    .res-chip {
      background:rgba(252,209,22,.08); border:1px solid rgba(252,209,22,.22);
      border-radius:6px; padding:.4rem .7rem; font-size:.72rem;
    }
    .res-chip .rc-lbl { color:rgba(224,244,255,.5); font-size:.62rem; text-transform:uppercase; }
    .res-chip .rc-val { color:#FCD116; font-weight:700; }

    .status-badge {
      display:inline-flex; align-items:center; gap:5px;
      border-radius:20px; padding:.35rem .9rem; font-size:.78rem; font-weight:700;
    }
    .status-pagado   { background:rgba(27,94,32,.4); border:1px solid #43a047; color:#a5d6a7; }
    .status-pendiente { background:rgba(230,81,0,.3); border:1px solid #f57c00; color:#ffcc80; }

    .cc-bar { height:8px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; margin:.4rem 0 .2rem; }
    .cc-bar-fill { height:100%; background:linear-gradient(90deg,#6a1b9a,#9c27b0); border-radius:4px; }

    /* ── Search ───────────────────────────────── */
    .search-box {
      background:rgba(4,20,50,.9) !important;
      border:1px solid rgba(252,209,22,.25) !important;
      color:#e0f4ff !important; font-size:.82rem;
    }
    .search-box::placeholder { color:rgba(224,244,255,.35) !important; }
    .search-box:focus { border-color:rgba(252,209,22,.55) !important; box-shadow:0 0 0 .15rem rgba(252,209,22,.12) !important; }

    /* ── Loading ──────────────────────────────── */
    #loading-bar { height:2px; background:#FCD116; position:fixed; top:0; left:0; transition:width .3s; z-index:9999; }
    .spinner-wrap { text-align:center; padding:3rem; color:rgba(224,244,255,.5); }

    /* ── Volver btn ───────────────────────────── */
    .btn-back {
      background:rgba(4,20,50,.8); border:1px solid rgba(252,209,22,.25);
      color:#FCD116; font-size:.78rem; padding:.4rem .9rem; border-radius:5px;
      cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:5px;
    }
    .btn-back:hover { border-color:#FCD116; background:rgba(252,209,22,.1); }

    .empty-msg { text-align:center; padding:2.5rem; color:rgba(224,244,255,.35); font-size:.85rem; }
  </style>
</head>
<body>
<div id="loading-bar" style="width:0%"></div>

<nav class="navbar navbar-dark px-3 py-2">
  <a class="navbar-brand" href="javascript:history.back()">
    <i class="fa fa-arrow-left me-2"></i>Explorador ET2023
  </a>
  <span class="navbar-text ms-auto">
    <i class="fa fa-sitemap me-1"></i>Corp → Depto → Municipio → Partido
  </span>
</nav>

<div class="container-fluid px-3 py-3">

  <!-- Spinner inicial -->
  <div class="spinner-wrap" id="spinner-main">
    <div class="spinner-border text-warning mb-2" style="width:2.5rem;height:2.5rem"></div>
    <div>Cargando datos ET2023 + Cuentas Claras…</div>
  </div>

  <!-- Contenido principal -->
  <div id="main-content" style="display:none">

    <!-- KPIs globales -->
    <div class="row g-2 mb-3" id="kpi-row"></div>

    <!-- Breadcrumb -->
    <div class="breadcrumb-cne" id="breadcrumb"></div>

    <!-- Búsqueda -->
    <div class="mb-2" id="search-wrap" style="display:none">
      <input type="text" class="form-control form-control-sm search-box"
             id="search-input" placeholder="Buscar…" oninput="filtrarLista()"/>
    </div>

    <!-- Vista corporaciones -->
    <div id="vista-corp" style="display:none">
      <div class="row g-3" id="corp-tiles"></div>
    </div>

    <!-- Vista lista (dpto / muni / partido) -->
    <div id="vista-lista" style="display:none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <button class="btn-back" onclick="volverNivel()">
          <i class="fa fa-arrow-left"></i> Volver
        </button>
        <span id="lista-title" style="font-size:.8rem;color:rgba(224,244,255,.5)"></span>
      </div>
      <div class="list-section" id="lista-container"></div>
    </div>

    <!-- Vista detalle partido -->
    <div id="vista-detalle" style="display:none">
      <div class="mb-2">
        <button class="btn-back" onclick="volverNivel()">
          <i class="fa fa-arrow-left"></i> Volver
        </button>
      </div>
      <div id="detalle-container"></div>
    </div>

  </div>
</div>

<script>
// ── Datos y estado ────────────────────────────────────────────────────────────
let TODOS = [];   // todos los registros cargados
let NIVEL = 0;    // 0=corp, 1=dpto, 2=muni, 3=partido
let SEL   = { corp: null, dpto: null, muni: null };

const CORP_ICON = { ALCALDIA:'fa-city', GOBERNACION:'fa-landmark', ASAMBLEA:'fa-university', CONCEJO:'fa-balance-scale', JAL:'fa-users' };
const CORP_COLOR = { ALCALDIA:'#1565c0', GOBERNACION:'#6a1b9a', ASAMBLEA:'#00695c', CONCEJO:'#c0392b', JAL:'#e65100' };

function fmt(n)  { return '$' + Math.round(n).toLocaleString('es-CO'); }
function fmtK(n) {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString('es-CO');
}
function pct(a, b) { return b > 0 ? Math.min(100, Math.round(a / b * 100)) : 0; }
function setBar(p) { document.getElementById('loading-bar').style.width = p + '%'; }

// ── Carga inicial ─────────────────────────────────────────────────────────────
async function init() {
  setBar(30);
  try {
    const res  = await fetch('/api/explorador');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    TODOS = data;
    setBar(90);
    renderKpis();
    setNivel(0);
    document.getElementById('spinner-main').style.display  = 'none';
    document.getElementById('main-content').style.display  = '';
    setBar(100);
    setTimeout(() => setBar(0), 500);
  } catch(e) {
    document.getElementById('spinner-main').innerHTML =
      `<div class="text-danger">Error: ${e.message}</div>`;
    setBar(0);
  }
}

// ── KPIs globales ─────────────────────────────────────────────────────────────
function renderKpis() {
  const totRec = TODOS.reduce((s,r) => s + r.val_reconocido, 0);
  const totNet = TODOS.reduce((s,r) => s + r.val_neto, 0);
  const totPen = TODOS.filter(r => !r.pagado).reduce((s,r) => s + r.val_reconocido, 0);
  const totPag = TODOS.filter(r => r.pagado).length;
  const corps  = [...new Set(TODOS.map(r => r.corp))].length;
  const dptos  = [...new Set(TODOS.map(r => r.dpto))].length;

  document.getElementById('kpi-row').innerHTML = `
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-blue h-100">
        <div class="icon"><i class="fa fa-check-circle"></i></div>
        <div><div class="val">${fmtK(totRec)}</div><div class="lbl">Total Reconocido</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-green h-100">
        <div class="icon"><i class="fa fa-money-bill-wave"></i></div>
        <div><div class="val">${fmtK(totNet)}</div><div class="lbl">Neto Girado</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-orange h-100">
        <div class="icon"><i class="fa fa-clock"></i></div>
        <div><div class="val">${fmtK(totPen)}</div><div class="lbl">Pendiente</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-teal h-100">
        <div class="icon"><i class="fa fa-list-ol"></i></div>
        <div><div class="val">${totPag} / ${TODOS.length}</div><div class="lbl">Pagados / Total</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-purple h-100">
        <div class="icon"><i class="fa fa-building"></i></div>
        <div><div class="val">${corps} corps · ${dptos} dptos</div><div class="lbl">Cobertura</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <div class="kpi-card kpi-red h-100">
        <div class="icon"><i class="fa fa-percentage"></i></div>
        <div><div class="val">${pct(TODOS.filter(r=>r.pagado).reduce((s,r)=>s+r.val_neto,0), totRec)}%</div><div class="lbl">% Ejecutado</div></div>
      </div>
    </div>`;
}

// ── Navegación ────────────────────────────────────────────────────────────────
function filtrar(registros) {
  if (!SEL.corp) return registros;
  let r = registros.filter(x => x.corp === SEL.corp);
  if (SEL.dpto) r = r.filter(x => x.dpto === SEL.dpto);
  if (SEL.muni !== null) r = r.filter(x => x.muni === SEL.muni);
  return r;
}

function setNivel(n, resetFrom) {
  NIVEL = n;
  if (resetFrom !== undefined) {
    if (resetFrom <= 0) SEL.corp = null;
    if (resetFrom <= 1) SEL.dpto = null;
    if (resetFrom <= 2) SEL.muni = null;
  }
  renderBreadcrumb();
  if (n === 0) renderCorp();
  else if (n === 1) renderDpto();
  else if (n === 2) renderMuni();
  else if (n === 3) renderPartidos();
}

function volverNivel() {
  if (NIVEL === 1) setNivel(0, 0);
  else if (NIVEL === 2) { SEL.dpto = null; setNivel(1); }
  else if (NIVEL === 3) {
    if (SEL.muni !== null) { SEL.muni = null; setNivel(2); }
    else { SEL.dpto = null; setNivel(1); }
  }
  else if (NIVEL === 4) setNivel(3);
}

function renderBreadcrumb() {
  let html = `<span class="bc-item ${NIVEL===0?'active':''}" onclick="setNivel(0,0)">
    <i class="fa fa-home me-1"></i>Inicio</span>`;
  if (SEL.corp) {
    html += `<span class="bc-sep">›</span>
      <span class="bc-item ${NIVEL===1?'active':''}" onclick="setNivel(1,1)">
        <i class="fa fa-building me-1"></i>${SEL.corp}</span>`;
  }
  if (SEL.dpto) {
    html += `<span class="bc-sep">›</span>
      <span class="bc-item ${NIVEL===2?'active':''}" onclick="setNivel(2,2)">
        <i class="fa fa-map-marker-alt me-1"></i>${SEL.dpto}</span>`;
  }
  if (SEL.muni !== null) {
    html += `<span class="bc-sep">›</span>
      <span class="bc-item ${NIVEL===3?'active':''}" onclick="setNivel(3,3)">
        <i class="fa fa-city me-1"></i>${SEL.muni||'(sin municipio)'}</span>`;
  }
  document.getElementById('breadcrumb').innerHTML = html;
}

// ── Nivel 0: Corporaciones ────────────────────────────────────────────────────
function renderCorp() {
  show('vista-corp'); hide('vista-lista'); hide('vista-detalle');
  hide('search-wrap');

  const corps = [...new Set(TODOS.map(r => r.corp))].sort();
  const html  = corps.map(corp => {
    const regs = TODOS.filter(r => r.corp === corp);
    const totR = regs.reduce((s,r) => s + r.val_reconocido, 0);
    const totN = regs.reduce((s,r) => s + r.val_neto, 0);
    const p    = pct(regs.filter(r=>r.pagado).reduce((s,r)=>s+r.val_neto,0), totR);
    const dptos = new Set(regs.map(r => r.dpto)).size;
    const icon = CORP_ICON[corp] || 'fa-building';
    return `
    <div class="col-6 col-md-4 col-xl-3">
      <div class="corp-tile" onclick="selCorp('${corp}')">
        <div class="ct-icon"><i class="fa ${icon}" style="color:${CORP_COLOR[corp]||'#FCD116'}"></i></div>
        <div class="ct-name">${corp}</div>
        <div class="ct-stats">
          ${fmtK(totR)} reconocido<br/>
          ${dptos} depto${dptos!==1?'s':''} · ${regs.length} registros
        </div>
        <div class="ct-bar"><div class="ct-bar-fill" style="width:${p}%"></div></div>
        <div style="font-size:.65rem;color:rgba(224,244,255,.45);margin-top:3px">${p}% ejecutado</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('corp-tiles').innerHTML = html;
}

function selCorp(corp) {
  SEL.corp = corp; SEL.dpto = null; SEL.muni = null;
  // GOBERNACION y ASAMBLEA no tienen municipio → ir directo a dpto
  setNivel(1);
}

// ── Nivel 1: Departamentos ────────────────────────────────────────────────────
function renderDpto() {
  show('vista-lista'); hide('vista-corp'); hide('vista-detalle');
  show('search-wrap');
  document.getElementById('search-input').value = '';
  document.getElementById('lista-title').textContent = `Departamentos en ${SEL.corp}`;

  const regs  = TODOS.filter(r => r.corp === SEL.corp);
  const dptos = agrupar(regs, 'dpto');

  renderLista(dptos, {
    getKey:   d => d.key,
    getName:  d => d.key,
    getSub:   d => `${d.items.length} registro${d.items.length!==1?'s':''}`,
    onClick:  d => { SEL.dpto = d.key; setNivel(2); }
  });
}

// ── Nivel 2: Municipios ───────────────────────────────────────────────────────
function renderMuni() {
  show('vista-lista'); hide('vista-corp'); hide('vista-detalle');
  show('search-wrap');
  document.getElementById('search-input').value = '';

  const regs  = TODOS.filter(r => r.corp === SEL.corp && r.dpto === SEL.dpto);
  const munis = agrupar(regs, 'muni');

  // Si solo hay un "municipio vacío" (GOBERNACION/ASAMBLEA) ir directo a partidos
  if (munis.length === 1 && munis[0].key === '') {
    SEL.muni = '';
    setNivel(3);
    return;
  }

  document.getElementById('lista-title').textContent = `Municipios en ${SEL.dpto}`;
  renderLista(munis, {
    getKey:   m => m.key,
    getName:  m => m.key || `(${SEL.corp} — nivel departamento)`,
    getSub:   m => `${m.items.length} registro${m.items.length!==1?'s':''}`,
    onClick:  m => { SEL.muni = m.key; setNivel(3); }
  });
}

// ── Nivel 3: Partidos ─────────────────────────────────────────────────────────
function renderPartidos() {
  show('vista-lista'); hide('vista-corp'); hide('vista-detalle');
  show('search-wrap');
  document.getElementById('search-input').value = '';
  document.getElementById('lista-title').textContent =
    `Partidos en ${SEL.muni ? SEL.muni : SEL.dpto}`;

  const regs = filtrar(TODOS);
  renderListaPartidos(regs);
}

function renderListaPartidos(regs) {
  const container = document.getElementById('lista-container');
  if (!regs.length) {
    container.innerHTML = '<div class="empty-msg"><i class="fa fa-inbox mb-2"></i><br/>Sin registros</div>';
    return;
  }
  const q = (document.getElementById('search-input').value || '').toUpperCase();
  const filtrados = q ? regs.filter(r => r.partido.toUpperCase().includes(q)) : regs;

  container.innerHTML = `
    <div class="list-header">
      <span><i class="fa fa-flag me-2"></i>${filtrados.length} PARTIDO${filtrados.length!==1?'S':''}</span>
      <span style="font-size:.68rem">RECONOCIDO · NETO · ESTADO</span>
    </div>` +
    filtrados.map((r,i) => `
    <div class="list-item" onclick="verDetalle(${i})">
      <div class="li-name">
        ${r.partido}
        <div class="li-sub">${r.muni ? r.muni+' · ' : ''}${r.dpto}</div>
      </div>
      <div class="li-money">
        <div class="lm-val">${fmtK(r.val_reconocido)}</div>
        <div class="lm-neto">${fmtK(r.val_neto)} neto</div>
      </div>
      <div style="min-width:80px;text-align:center">
        ${r.pagado
          ? '<span style="font-size:.7rem;color:#a5d6a7;font-weight:700"><i class="fa fa-check-circle me-1"></i>PAGADO</span>'
          : '<span style="font-size:.7rem;color:#ffcc80;font-weight:700"><i class="fa fa-clock me-1"></i>PENDIENTE</span>'}
      </div>
      <div class="arrow-icon"><i class="fa fa-chevron-right"></i></div>
    </div>`).join('');

  // Guardar índice para acceso desde verDetalle
  container._regs = filtrados;
}

// ── Detalle completo de un partido ────────────────────────────────────────────
function verDetalle(idx) {
  const r = document.getElementById('lista-container')._regs[idx];
  if (!r) return;

  show('vista-detalle'); hide('vista-lista'); hide('vista-corp');
  hide('search-wrap');
  NIVEL = 4;
  renderBreadcrumb();

  const pctCC = r.cc_candidatos > 0 ? pct(r.cc_reportaron, r.cc_candidatos) : 0;

  document.getElementById('detalle-container').innerHTML = `
  <div class="partido-detail">
    <div class="pd-header">
      <div>
        <div class="pd-nombre"><i class="fa fa-flag me-2"></i>${r.partido}</div>
        <div class="pd-loc">
          <i class="fa fa-building me-1" style="color:${CORP_COLOR[r.corp]||'#888'}"></i>${r.corp}
          &nbsp;·&nbsp;<i class="fa fa-map-marker-alt me-1"></i>${r.dpto}
          ${r.muni ? `&nbsp;·&nbsp;<i class="fa fa-city me-1"></i>${r.muni}` : ''}
        </div>
      </div>
      <div class="text-end">
        ${r.pagado
          ? '<span class="status-badge status-pagado"><i class="fa fa-check-circle"></i> PAGADO</span>'
          : '<span class="status-badge status-pendiente"><i class="fa fa-clock"></i> PENDIENTE</span>'}
      </div>
    </div>

    <div class="pd-body">

      <!-- Pagos CNE -->
      <div class="pd-section-title"><i class="fa fa-money-bill-wave me-1"></i>Pago CNE — ET2023</div>
      <div class="pd-grid">
        <div class="pd-stat">
          <div class="ps-lbl">Valor Reconocido</div>
          <div class="ps-val val-rec">${fmt(r.val_reconocido)}</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">Auditoría (descuento)</div>
          <div class="ps-val val-aud">- ${fmt(r.val_auditoria)}</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">Neto Girado</div>
          <div class="ps-val val-neto">${fmt(r.val_neto)}</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">% Auditoría / Reconocido</div>
          <div class="ps-val" style="color:#ef9a9a">${r.val_reconocido>0?(r.val_auditoria/r.val_reconocido*100).toFixed(2):0}%</div>
        </div>
      </div>

      <!-- Resoluciones y fechas -->
      <div class="pd-section-title"><i class="fa fa-file-alt me-1"></i>Resoluciones</div>
      <div class="pd-res-grid">
        <div class="res-chip">
          <div class="rc-lbl">Res. Reconocimiento</div>
          <div class="rc-val">${r.res_reconocimiento || '—'}</div>
        </div>
        <div class="res-chip">
          <div class="rc-lbl">Fecha Reconocimiento</div>
          <div class="rc-val">${r.fecha_reconocimiento || '—'}</div>
        </div>
        <div class="res-chip">
          <div class="rc-lbl">Res. Pago</div>
          <div class="rc-val">${r.res_pago || '—'}</div>
        </div>
        <div class="res-chip">
          <div class="rc-lbl">Fecha Pago</div>
          <div class="rc-val">${r.fecha_pago || '—'}</div>
        </div>
      </div>

      <!-- Cuentas Claras -->
      <div class="pd-section-title"><i class="fa fa-file-invoice-dollar me-1"></i>Cuentas Claras — Declaración candidatos</div>
      ${r.cc_candidatos > 0 ? `
      <div class="pd-grid">
        <div class="pd-stat">
          <div class="ps-lbl">Candidatos</div>
          <div class="ps-val" style="color:#e0f4ff">${r.cc_candidatos}</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">Enviaron Informe</div>
          <div class="ps-val" style="color:#ce93d8">${r.cc_reportaron} <span style="font-size:.7rem;opacity:.6">/ ${r.cc_candidatos}</span></div>
          <div class="cc-bar"><div class="cc-bar-fill" style="width:${pctCC}%"></div></div>
          <div style="font-size:.65rem;color:rgba(224,244,255,.4)">${pctCC}% reportaron</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">Ingresos Declarados</div>
          <div class="ps-val val-ing">${fmt(r.cc_ingreso)}</div>
        </div>
        <div class="pd-stat">
          <div class="ps-lbl">Gastos Declarados</div>
          <div class="ps-val val-gast">${fmt(r.cc_gasto)}</div>
        </div>
      </div>
      ` : `<div class="empty-msg" style="padding:1rem"><i class="fa fa-info-circle me-1"></i>Sin datos de Cuentas Claras para este partido en este circuito</div>`}

    </div>
  </div>`;
}

// ── Helpers de lista genérica ─────────────────────────────────────────────────
function agrupar(regs, campo) {
  const map = {};
  for (const r of regs) {
    const k = r[campo];
    if (!map[k]) map[k] = { key: k, items: [], totRec: 0, totNet: 0, pagados: 0 };
    map[k].items.push(r);
    map[k].totRec += r.val_reconocido;
    map[k].totNet += r.val_neto;
    if (r.pagado) map[k].pagados++;
  }
  return Object.values(map).sort((a,b) => b.totRec - a.totRec);
}

function renderLista(items, opts) {
  const container = document.getElementById('lista-container');
  const q = (document.getElementById('search-input').value || '').toUpperCase();
  const filtrados = q ? items.filter(d => opts.getName(d).toUpperCase().includes(q)) : items;

  if (!filtrados.length) {
    container.innerHTML = '<div class="empty-msg">Sin resultados</div>';
    return;
  }
  container.innerHTML = `
    <div class="list-header">
      <span>${filtrados.length} ELEMENTO${filtrados.length!==1?'S':''}</span>
      <span style="font-size:.68rem">RECONOCIDO · EJECUTADO</span>
    </div>` +
    filtrados.map(d => {
      const p = pct(d.pagados > 0 ? d.totNet : 0, d.totRec);
      return `
      <div class="list-item" onclick="(() => { ${opts.onClick.toString().replace(/^.*?{|}$/g,'').trim()} })()"
           data-key="${opts.getKey(d)}">
        <div class="li-name">
          ${opts.getName(d)}
          <div class="li-sub">${opts.getSub(d)}</div>
        </div>
        <div class="li-money">
          <div class="lm-val">${fmtK(d.totRec)}</div>
          <div class="lm-neto">${fmtK(d.totNet)} neto</div>
        </div>
        <div class="li-bar">
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${p}%"></div></div>
          <div class="mini-pct">${p}%</div>
        </div>
        <div class="li-count">${d.pagados}/${d.items.length}<br/><span style="font-size:.62rem">pagados</span></div>
        <div class="arrow-icon"><i class="fa fa-chevron-right"></i></div>
      </div>`;
    }).join('');

  // Registrar click handlers correctamente
  container.querySelectorAll('.list-item').forEach((el, i) => {
    el.onclick = () => opts.onClick(filtrados[i]);
  });
}

function filtrarLista() {
  if (NIVEL === 1) renderDpto();
  else if (NIVEL === 2) renderMuni();
  else if (NIVEL === 3) renderListaPartidos(filtrar(TODOS));
}

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

init();
</script>

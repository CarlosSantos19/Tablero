<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pagos por Partido — FNFPCE</title>
  <link rel="stylesheet" href="vendor/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/cne-theme.css"/>
  <link rel="stylesheet" href="vendor/css/all.min.css"/>
  <style>
    .kpi-card { border-radius:12px; padding:.9rem 1.1rem; color:#fff; display:flex; align-items:center; gap:.8rem; }
    .kpi-card .icon { font-size:1.4rem; opacity:.8; }
    .kpi-card .val  { font-size:1.15rem; font-weight:700; line-height:1; }
    .kpi-card .lbl  { font-size:.66rem; opacity:.85; text-transform:uppercase; letter-spacing:.05em; }
    .kpi-blue   { background:linear-gradient(135deg,#003478,#1565c0); }
    .kpi-red    { background:linear-gradient(135deg,#b71c1c,#c62828); }
    .kpi-green  { background:linear-gradient(135deg,#1b5e20,#2e7d32); }
    .kpi-purple { background:linear-gradient(135deg,#4a148c,#6a1b9a); }
    .kpi-teal   { background:linear-gradient(135deg,#00695c,#00897b); }

    .section-card {
      background:rgba(4,20,50,.85);
      border:1px solid rgba(252,209,22,.18);
      border-radius:12px;
      padding:1.2rem 1.4rem;
      margin-bottom:1.2rem;
    }
    .section-title {
      font-family:'Orbitron',monospace;
      font-size:.78rem;
      font-weight:700;
      color:#FCD116;
      border-bottom:1px solid rgba(252,209,22,.22);
      padding-bottom:.4rem;
      margin-bottom:.9rem;
      letter-spacing:.08em;
    }

    /* Filtros */
    .form-control, .form-select {
      background:rgba(4,20,50,.9) !important;
      border:1px solid rgba(252,209,22,.25) !important;
      color:#e0f4ff !important;
      font-size:.82rem;
    }
    .form-control::placeholder { color:rgba(224,244,255,.4) !important; }
    .form-control:focus, .form-select:focus {
      border-color:rgba(252,209,22,.55) !important;
      box-shadow:0 0 0 .15rem rgba(252,209,22,.15) !important;
    }
    .form-select option { background:#04101e; }

    /* Toggle vista */
    .btn-vista {
      background:rgba(4,20,50,.8);
      border:1px solid rgba(252,209,22,.25);
      color:rgba(224,244,255,.7);
      font-size:.78rem;
      padding:.45rem 1rem;
      border-radius:5px;
      cursor:pointer;
      transition:all .2s;
    }
    .btn-vista:hover { border-color:rgba(252,209,22,.5); color:#FCD116; }
    .btn-vista.active {
      background:rgba(252,209,22,.18);
      border-color:#FCD116;
      color:#FCD116;
      font-weight:600;
    }

    /* Tabla */
    #tabla { font-size:.8rem; }
    #tabla thead th {
      background:rgba(0,56,147,.55) !important;
      color:#FCD116 !important;
      border-bottom:1px solid rgba(252,209,22,.3) !important;
      white-space:nowrap;
      font-family:'Orbitron',monospace;
      font-size:.68rem;
      letter-spacing:.04em;
      padding:.65rem .75rem;
      position:sticky;
      top:0;
    }
    #tabla tbody tr { border-bottom:1px solid rgba(252,209,22,.07); }
    #tabla tbody tr:hover { background:rgba(0,56,147,.25) !important; }
    #tabla tbody td { padding:.6rem .75rem; color:#e0f4ff; vertical-align:middle; }
    #tabla tfoot td {
      background:rgba(0,56,147,.35) !important;
      color:#FCD116 !important;
      font-weight:700;
      border-top:1px solid rgba(252,209,22,.3) !important;
      font-size:.82rem;
    }

    .money { text-align:right; font-variant-numeric:tabular-nums; }
    .money.rec  { color:#64b5f6; font-weight:600; }
    .money.aud  { color:#ef9a9a; }
    .money.neto { color:#a5d6a7; font-weight:700; }

    .partido-badge {
      display:inline-block;
      background:rgba(0,56,147,.45);
      border:1px solid rgba(252,209,22,.2);
      border-radius:4px;
      padding:2px 8px;
      font-size:.72rem;
      font-weight:600;
      color:#FCD116;
      max-width:260px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .corp-badge {
      display:inline-block;
      background:rgba(0,56,147,.3);
      border:1px solid rgba(100,181,246,.2);
      border-radius:10px;
      padding:1px 7px;
      font-size:.7rem;
      color:#90caf9;
    }
    .res-badge {
      display:inline-block;
      background:rgba(252,209,22,.1);
      border:1px solid rgba(252,209,22,.25);
      border-radius:4px;
      padding:1px 6px;
      font-size:.72rem;
      color:#FCD116;
      font-weight:600;
    }

    .spinner-wrap { text-align:center; padding:3rem; color:rgba(224,244,255,.5); }
    .error-msg { color:#ef9a9a; padding:1.5rem; text-align:center; }

    #loading-bar { height:2px; background:#FCD116; position:fixed; top:0; left:0; transition:width .3s; z-index:9999; }

    .tabla-wrap { overflow-x:auto; border-radius:8px; border:1px solid rgba(252,209,22,.12); }
    .row-num { color:rgba(224,244,255,.35); font-size:.72rem; }
  </style>
</head>
<body>
<div id="loading-bar" style="width:0%"></div>

<nav class="navbar navbar-dark px-3 py-2">
  <a class="navbar-brand" href="javascript:history.back()">
    <i class="fa fa-arrow-left me-2"></i>Pagos por Partido
  </a>
  <span class="navbar-text ms-auto">
    <i class="fa fa-database me-1"></i>pagostres.db &nbsp;·&nbsp; ET2023
  </span>
</nav>

<div class="container-fluid px-3 py-3">

  <!-- KPI cards -->
  <div class="row g-2 mb-3" id="kpi-row">
    <div class="col-6 col-md-4 col-lg">
      <div class="kpi-card kpi-purple h-100">
        <div class="icon"><i class="fa fa-flag"></i></div>
        <div><div class="val" id="sum-partidos">—</div><div class="lbl">Partidos / Movimientos</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="kpi-card kpi-blue h-100">
        <div class="icon"><i class="fa fa-check-circle"></i></div>
        <div><div class="val" id="sum-reconocido">—</div><div class="lbl">Total Reconocido</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="kpi-card kpi-red h-100">
        <div class="icon"><i class="fa fa-search-minus"></i></div>
        <div><div class="val" id="sum-auditoria">—</div><div class="lbl">Total Auditoría</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="kpi-card kpi-green h-100">
        <div class="icon"><i class="fa fa-money-bill-wave"></i></div>
        <div><div class="val" id="sum-neto">—</div><div class="lbl">Total Neto Girado</div></div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="kpi-card kpi-teal h-100">
        <div class="icon"><i class="fa fa-list-ol"></i></div>
        <div><div class="val" id="sum-registros">—</div><div class="lbl">Registros</div></div>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="section-card">
    <div class="section-title"><i class="fa fa-filter me-2"></i>Filtros</div>
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label small mb-1" style="color:rgba(224,244,255,.6)">Partido / Movimiento</label>
        <input type="text" class="form-control form-control-sm" id="f-partido" placeholder="Ej: CONSERVADOR"/>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label small mb-1" style="color:rgba(224,244,255,.6)">Corporación</label>
        <select class="form-select form-select-sm" id="f-corp">
          <option value="">Todas</option>
          <option>ALCALDIA</option><option>CONCEJO</option><option>ASAMBLEA</option>
          <option>GOBERNACION</option><option>JAL</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label small mb-1" style="color:rgba(224,244,255,.6)">Departamento</label>
        <input type="text" class="form-control form-control-sm" id="f-dpto" placeholder="Ej: CUNDINAMARCA"/>
      </div>
      <div class="col-12 col-md-2 d-flex gap-2">
        <button class="btn btn-sm btn-warning fw-bold flex-fill" onclick="cargar()">
          <i class="fa fa-search me-1"></i>Filtrar
        </button>
        <button class="btn btn-sm btn-outline-secondary flex-fill" onclick="limpiar()">
          <i class="fa fa-times"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Toggle vista -->
  <div class="d-flex gap-2 mb-2 flex-wrap">
    <button class="btn-vista active" id="btn-agrupado"   onclick="setVista('agrupado')">
      <i class="fa fa-layer-group me-1"></i>Por Partido (total)
    </button>
    <button class="btn-vista" id="btn-detalle"           onclick="setVista('detalle')">
      <i class="fa fa-sitemap me-1"></i>Por Corp / Dpto
    </button>
    <button class="btn-vista" id="btn-individual"        onclick="setVista('individual')">
      <i class="fa fa-list me-1"></i>Detalle completo
    </button>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-success" onclick="exportarCSV()" title="Exportar CSV">
        <i class="fa fa-file-csv me-1"></i>CSV
      </button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="section-card p-0">
    <div class="spinner-wrap" id="spinner">
      <div class="spinner-border text-warning mb-2" style="width:2rem;height:2rem"></div>
      <div>Cargando datos…</div>
    </div>
    <div class="error-msg" id="error-msg" style="display:none"></div>
    <div class="tabla-wrap" id="tabla-wrap" style="display:none">
      <table class="table table-borderless mb-0" id="tabla">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>

</div>

<script>
let vista = 'agrupado';
let datos = [];

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

function setVista(v) {
  vista = v;
  document.getElementById('btn-agrupado').classList.toggle('active',   v === 'agrupado');
  document.getElementById('btn-detalle').classList.toggle('active',    v === 'detalle');
  document.getElementById('btn-individual').classList.toggle('active', v === 'individual');
  cargar();
}

function limpiar() {
  document.getElementById('f-partido').value = '';
  document.getElementById('f-corp').value    = '';
  document.getElementById('f-dpto').value    = '';
  cargar();
}

function setBar(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
}

async function cargar() {
  setBar(20);
  document.getElementById('spinner').style.display    = '';
  document.getElementById('tabla-wrap').style.display = 'none';
  document.getElementById('error-msg').style.display  = 'none';

  const p = document.getElementById('f-partido').value.trim();
  const c = document.getElementById('f-corp').value.trim();
  const d = document.getElementById('f-dpto').value.trim();

  const url = `/api/pagos_partido?agrupado=${vista==='agrupado'?1:0}&individual=${vista==='individual'?1:0}` +
    (p ? `&partido=${encodeURIComponent(p)}` : '') +
    (c ? `&corp=${encodeURIComponent(c)}` : '') +
    (d ? `&dpto=${encodeURIComponent(d)}` : '');

  try {
    setBar(55);
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    datos = data;
    setBar(85);
    renderTabla(data);
    renderSummary(data);
    setBar(100);
    setTimeout(() => setBar(0), 600);
  } catch(e) {
    setBar(0);
    document.getElementById('spinner').style.display   = 'none';
    document.getElementById('error-msg').style.display = '';
    document.getElementById('error-msg').textContent   = 'Error: ' + e.message;
  }
}

function renderSummary(data) {
  const totRec = data.reduce((s,r) => s + (r.val_reconocido||0), 0);
  const totAud = data.reduce((s,r) => s + (r.val_auditoria||0), 0);
  const totNet = data.reduce((s,r) => s + (r.val_neto||0), 0);
  const totReg = vista === 'individual' ? data.length : data.reduce((s,r) => s + (r.registros||0), 0);
  const partidos = vista === 'agrupado' ? data.length : new Set(data.map(r=>r.partido)).size;
  document.getElementById('sum-partidos').textContent   = partidos;
  document.getElementById('sum-reconocido').textContent = fmt(totRec);
  document.getElementById('sum-auditoria').textContent  = fmt(totAud);
  document.getElementById('sum-neto').textContent       = fmt(totNet);
  document.getElementById('sum-registros').textContent  = totReg.toLocaleString();
}

function renderTabla(data) {
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  const tfoot = document.getElementById('tfoot');

  if (vista === 'individual') {
    thead.innerHTML = `<tr>
      <th>#</th>
      <th>Partido / Movimiento</th>
      <th>Corporación</th>
      <th>Departamento</th>
      <th>Municipio</th>
      <th class="money">Valor Reconocido</th>
      <th class="money">Auditoría</th>
      <th class="money">Neto Girado</th>
      <th>Res. Reconocim.</th>
      <th>Fecha Reconoc.</th>
      <th>Res. Pago</th>
      <th>Fecha Pago</th>
    </tr>`;
    tbody.innerHTML = data.map((r,i) => `<tr>
      <td class="row-num">${i+1}</td>
      <td><span class="partido-badge" title="${r.partido}">${r.partido}</span></td>
      <td><span class="corp-badge">${r.corp||''}</span></td>
      <td style="font-weight:600">${r.dpto||''}</td>
      <td style="font-size:.72rem;color:rgba(224,244,255,.55)">${r.municipio||''}</td>
      <td class="money rec">${fmt(r.val_reconocido)}</td>
      <td class="money aud">${fmt(r.val_auditoria)}</td>
      <td class="money neto">${fmt(r.val_neto)}</td>
      <td>${r.res_reconocimiento ? `<span class="res-badge">${r.res_reconocimiento}</span>` : '—'}</td>
      <td style="font-size:.75rem;color:rgba(224,244,255,.6)">${r.fecha_reconocimiento||'—'}</td>
      <td>${r.res_pago ? `<span class="res-badge">${r.res_pago}</span>` : '—'}</td>
      <td style="font-size:.75rem;color:rgba(224,244,255,.6)">${r.fecha_pago||'—'}</td>
    </tr>`).join('');
    const totRec = data.reduce((s,r)=>s+(r.val_reconocido||0),0);
    const totAud = data.reduce((s,r)=>s+(r.val_auditoria||0),0);
    const totNet = data.reduce((s,r)=>s+(r.val_neto||0),0);
    tfoot.innerHTML = `<tr>
      <td colspan="5">TOTAL — ${data.length.toLocaleString()} registros</td>
      <td class="money rec">${fmt(totRec)}</td>
      <td class="money aud">${fmt(totAud)}</td>
      <td class="money neto">${fmt(totNet)}</td>
      <td colspan="4"></td>
    </tr>`;
    document.getElementById('spinner').style.display    = 'none';
    document.getElementById('tabla-wrap').style.display = '';
    return;
  }

  if (vista === 'agrupado') {
    thead.innerHTML = `<tr>
      <th>#</th>
      <th>Partido / Movimiento</th>
      <th>Registros</th>
      <th class="money">Valor Reconocido</th>
      <th class="money">Auditoría</th>
      <th class="money">Neto Girado</th>
      <th>Corporaciones</th>
      <th>Último Pago</th>
    </tr>`;
    tbody.innerHTML = data.map((r,i) => `<tr>
      <td class="row-num">${i+1}</td>
      <td><span class="partido-badge" title="${r.partido}">${r.partido}</span></td>
      <td style="color:rgba(224,244,255,.7)">${r.registros}</td>
      <td class="money rec">${fmt(r.val_reconocido)}</td>
      <td class="money aud">${fmt(r.val_auditoria)}</td>
      <td class="money neto">${fmt(r.val_neto)}</td>
      <td style="font-size:.72rem;color:rgba(224,244,255,.55)">${(r.corporaciones||'').replace(/,/g,', ')}</td>
      <td style="font-size:.75rem;color:rgba(224,244,255,.6)">${r.ultima_fecha_pago||''}</td>
    </tr>`).join('');
    const totRec = data.reduce((s,r)=>s+(r.val_reconocido||0),0);
    const totAud = data.reduce((s,r)=>s+(r.val_auditoria||0),0);
    const totNet = data.reduce((s,r)=>s+(r.val_neto||0),0);
    tfoot.innerHTML = `<tr>
      <td colspan="3">TOTAL — ${data.length} partidos</td>
      <td class="money rec">${fmt(totRec)}</td>
      <td class="money aud">${fmt(totAud)}</td>
      <td class="money neto">${fmt(totNet)}</td>
      <td colspan="2"></td>
    </tr>`;
  } else {
    thead.innerHTML = `<tr>
      <th>#</th>
      <th>Partido / Movimiento</th>
      <th>Corporación</th>
      <th>Departamento</th>
      <th>Registros</th>
      <th class="money">Valor Reconocido</th>
      <th class="money">Auditoría</th>
      <th class="money">Neto Girado</th>
      <th>Resolución Pago</th>
      <th>Último Pago</th>
    </tr>`;
    tbody.innerHTML = data.map((r,i) => `<tr>
      <td class="row-num">${i+1}</td>
      <td><span class="partido-badge" title="${r.partido}">${r.partido}</span></td>
      <td><span class="corp-badge">${r.corp||''}</span></td>
      <td style="font-weight:600">${r.dpto||''}</td>
      <td style="color:rgba(224,244,255,.7)">${r.registros}</td>
      <td class="money rec">${fmt(r.val_reconocido)}</td>
      <td class="money aud">${fmt(r.val_auditoria)}</td>
      <td class="money neto">${fmt(r.val_neto)}</td>
      <td>${r.resoluciones ? `<span class="res-badge">${r.resoluciones}</span>` : ''}</td>
      <td style="font-size:.75rem;color:rgba(224,244,255,.6)">${r.ultima_fecha_pago||''}</td>
    </tr>`).join('');
    const totRec = data.reduce((s,r)=>s+(r.val_reconocido||0),0);
    const totAud = data.reduce((s,r)=>s+(r.val_auditoria||0),0);
    const totNet = data.reduce((s,r)=>s+(r.val_neto||0),0);
    tfoot.innerHTML = `<tr>
      <td colspan="5">TOTAL</td>
      <td class="money rec">${fmt(totRec)}</td>
      <td class="money aud">${fmt(totAud)}</td>
      <td class="money neto">${fmt(totNet)}</td>
      <td colspan="2"></td>
    </tr>`;
  }

  document.getElementById('spinner').style.display    = 'none';
  document.getElementById('tabla-wrap').style.display = '';
}

function exportarCSV() {
  if (!datos.length) return;
  const keys = Object.keys(datos[0]);
  const rows = [keys.join(','), ...datos.map(r => keys.map(k => JSON.stringify(r[k]??'')).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pagos_partido_${vista}.csv`;
  a.click();
}

// Enter en filtros
document.addEventListener('keydown', e => { if (e.key === 'Enter') cargar(); });

cargar();
</script>
</body>
</html>
